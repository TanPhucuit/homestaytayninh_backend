services:
  - type: web
    name: homestaytayninh-backend
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start:prod
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PAYMENT_PROVIDER
        value: mock-apipay
      - key: APIPAY_BASE_URL
        sync: false
      - key: APIPAY_CREATE_PAYMENT_PATH
        sync: false
      - key: APIPAY_ACCESS_KEY
        sync: false
      - key: APIPAY_SECRET_KEY
        sync: false
      - key: APIPAY_CURRENCY
        value: VND
      - key: APIPAY_RETURN_URL
        sync: false
      - key: APIPAY_CALLBACK_URL
        sync: false
      - key: WEB_ORIGIN
        sync: false
      - key: REDIS_URL
        sync: false
      - key: SESSION_TTL_SECONDS
        value: "604800"
      - key: REDIS_AUTO_SEED
        value: "true"
      - key: REDIS_SEED_DEMO
        value: "false"
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: RABBITMQ_URL
        sync: false
